<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OceanPulse OpsCenter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="dark-theme">

<nav class="navbar navbar-dark bg-black border-bottom border-secondary">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">
            <span class="text-success fw-bold">OCEANPULSE</span> // OpsCenter
        </a>
        <div class="d-flex">
            <span class="badge bg-success me-2" id="conn-main">MAIN: ONLINE</span>
            <span class="badge bg-success" id="conn-health">HEALTH: ONLINE</span>
        </div>
    </div>
</nav>

<div class="container-fluid mt-4">
    <div class="row">
        <!-- SYSTEM A: MAIN MISSION -->
        <div class="col-md-8">
            <div class="card bg-dark border-success mb-4">
                <div class="card-header border-success text-success fw-bold">
                    SYSTEM A: MISSION STATUS
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-4">
                            <h5 class="text-muted">TDS SENSOR</h5>
                            <h1 class="display-4 fw-bold text-white" id="val-tds">---</h1>
                            <small class="text-muted">ppm</small>
                        </div>
                        <div class="col-md-4">
                            <h5 class="text-muted">VOLTAGE</h5>
                            <h2 class="text-white" id="val-volt">--- V</h2>
                        </div>
                        <div class="col-md-4 text-end">
                            <h5 class="text-muted">RELAY</h5>
                            <span class="badge bg-secondary p-2" id="val-relay">OFF</span>
                            <div class="mt-3">
                                <button class="btn btn-outline-success w-100 mb-2" onclick="sendCommand('RELAY_ON')">ACTIVATE</button>
                                <button class="btn btn-outline-danger w-100" onclick="sendCommand('RELAY_OFF')">DEACTIVATE</button>
                            </div>
                        </div>
                    </div>
                    <div class="mt-4" style="height: 300px;">
                        <canvas id="tdsChart"></canvas>
                    </div>
                </div>
            </div>
        </div>

        <!-- SYSTEM B: HEALTH & LOGS -->
        <div class="col-md-4">
            <div class="card bg-dark border-secondary mb-4">
                <div class="card-header border-secondary text-info fw-bold">
                    SYSTEM B: HEALTH MONITOR
                </div>
                <div class="card-body">
                    <ul class="list-group list-group-flush bg-dark">
                        <li class="list-group-item bg-dark text-white border-secondary">
                            Internal Temp: <span class="fw-bold text-info float-end" id="val-temp">--.- °C</span>
                        </li>
                        <li class="list-group-item bg-dark text-white border-secondary">
                            Uptime: <span class="float-end text-muted" id="val-uptime">--</span>
                        </li>
                        <li class="list-group-item bg-dark text-white border-secondary">
                            CPU Load: <span class="float-end text-muted">12%</span>
                        </li>
                    </ul>
                </div>
            </div>

            <div class="card bg-dark border-secondary">
                <div class="card-header border-secondary text-white fw-bold">
                    EVENT LOG
                </div>
                <div class="card-body bg-black" style="height: 250px; overflow-y: auto; font-family: monospace; font-size: 0.8rem;">
                    <div id="console-log" class="text-success">
                        > System Initialized...<br>
                        > Connecting to Telemetry Stream...
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/static/js/dashboard.js"></script>
</body>
</html>
